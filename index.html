// ── localStorage storage shim ──
window.storage = {
  _p: "smwf_",
  get: function(k){
    return new Promise(function(res,rej){
      var v=localStorage.getItem(window.storage._p+k);
      if(v===null){rej(new Error("Key not found"));return;}
      res({key:k,value:v});
    });
  },
  set: function(k,v){
    return new Promise(function(res){
      localStorage.setItem(window.storage._p+k,v);
      res({key:k,value:v});
    });
  },
  delete: function(k){
    return new Promise(function(res){
      localStorage.removeItem(window.storage._p+k);
      res({key:k,deleted:true});
    });
  },
  list: function(pfx){
    return new Promise(function(res){
      var keys=[];
      for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i);
        if(key&&key.startsWith(window.storage._p+(pfx||""))){
          keys.push(key.replace(window.storage._p,""));
        }
      }
      res({keys:keys});
    });
  }
};

// ── Load scripts sequentially with error handling ──
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function() {
    document.getElementById('loading').innerHTML =
      '<div style="color:#f87171;font-size:15px;padding:24px;text-align:center">' +
      '⚠ Failed to load a required script.<br><br>' +
      '<span style="color:#64748b;font-size:13px">Please check your internet connection and refresh the page.</span><br><br>' +
      '<button onclick="location.reload()" style="background:#6366f1;color:white;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px">↺ Retry</button>' +
      '</div>';
  };
  document.head.appendChild(s);
}

// Load React → ReactDOM → Babel → then boot app
loadScript("https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js", function() {
  loadScript("https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js", function() {
    loadScript("https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js", function() {
      bootApp();
    });
  });
});

function bootApp() {
  try {
    var appCode = document.getElementById('app-src').textContent;
    var compiled = Babel.transform(appCode, {
      presets: ['react'],
      filename: 'app.jsx'
    }).code;
    var fn = new Function('React','ReactDOM', compiled + '\nreturn App;');
    var App = fn(React, ReactDOM);
    document.getElementById('loading').style.display = 'none';
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#f87171;font-size:14px;padding:24px;max-width:500px;text-align:center">' +
      '⚠ App failed to start:<br><br>' +
      '<code style="background:#0a0e18;padding:8px;border-radius:6px;font-size:11px;display:block;text-align:left;margin:8px 0;word-break:break-all">' + e.message + '</code>' +
      '<button onclick="location.reload()" style="background:#6366f1;color:white;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;margin-top:12px">↺ Retry</button>' +
      '</div>';
  }
}
</script>

function genKPI(staffId, salary) {
  const monthlyT = salary * KPI_MULT;
  const d = {};
  for (let m = 0; m <= CUR_MONTH; m++) {
    const v = 0.55 + Math.random() * 0.9;
    const billed = Math.round(monthlyT * v * (0.7 + Math.random() * 0.5));
    const collected = Math.round(billed * (0.5 + Math.random() * 0.5));
    d[`${CUR_YEAR}-${m}`] = { billed, collected };
  }
  return d;
}

// Given a FYE date string (YYYY-MM-DD), returns all critical tax deadlines
function calcTaxDeadlines(fye) {
  if (!fye) return null;
  const d = new Date(fye);
  if (isNaN(d)) return null;
  // Finalisation deadline: FYE + 7 months (last day)
  const finMonth = d.getMonth() + 7; // 0-indexed
  const finYear  = d.getFullYear() + Math.floor(finMonth / 12);
  const finMo    = finMonth % 12;
  // Last day of that month
  const finDate  = new Date(finYear, finMo + 1, 0);
  // Submission deadline: FYE + 8 months (last day) — online grace +1 month
  const subMonth = d.getMonth() + 8;
  const subYear  = d.getFullYear() + Math.floor(subMonth / 12);
  const subMo    = subMonth % 12;
  const subDate  = new Date(subYear, subMo + 1, 0);
  const fmt2 = dt => dt.toISOString().split('T')[0];
  return {
    fye,
    finalisation: fmt2(finDate),  // Must be finalised by this date (7 months)
    submission:   fmt2(subDate),  // Must be submitted to TAEF by this date (8 months)
    // MTRS: 30 days after Form C submission — calculated separately when T8 is done
  };
}
function addDays(dateStr, days) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}
function fmtDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-MY', { day:'2-digit', month:'short', year:'numeric' });
}
function deadlineUrgency(dateStr) {
  if (!dateStr) return null;
  const days = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
  if (days < 0)   return { color:'#f87171', label:`OVERDUE ${Math.abs(days)}d`, urgent:true };
  if (days <= 14) return { color:'#ef4444', label:`${days}d — CRITICAL`,        urgent:true };
  if (days <= 30) return { color:'#fb923c', label:`${days}d — Urgent`,          urgent:true };
  if (days <= 60) return { color:'#f59e0b', label:`${days}d — Watch`,           urgent:false };
  return              { color:'#4ade80', label:`${days}d`,                       urgent:false };
}

// ─── CIRCULAR PROGRESS ────────────────────────────────────────────────────────
function CircleProgress({ pct, size=150, color="#a78bfa" }) {
  const r=(size-18)/2, circ=2*Math.PI*r, filled=Math.min(pct/100,1)*circ;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a2235" strokeWidth={11}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={11}
          strokeDasharray={`${filled} ${circ}`} strokeLinecap="round"
          style={{transition:"stroke-dasharray 1.2s cubic-bezier(0.4,0,0.2,1)",filter:`drop-shadow(0 0 8px ${color}55)`}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:22,fontWeight:800,color,letterSpacing:"-0.04em",lineHeight:1}}>{Math.round(pct)}%</div>
        <div style={{fontSize:10,color:"#475569",marginTop:2}}>of KPI</div>
      </div>
    </div>
  );
}

                          <span>{s.name} <span style={{fontSize:11,color:"#475569"}}>({s.department} · {s.branch})</span></span>

                                    {!isFut&&<button className="btn bg bsm" style={{width:"100%",fontSize:10}} onClick={()=>{setEditKpiKey(`${s.id}-${m}`);setKpiEditForm({billed:d.billed,collected:d.collected});}}>✏ Edit</button>}

                  </div>;

      {showStaffModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&setShowStaffModal(false)}>
          <div style={{background:"#0d1117",border:"1px solid #1e293b",borderRadius:16,padding:24,width:420}}>
            <h2 style={{margin:"0 0 16px",fontSize:16,fontWeight:800}}>{editStaffId?"Edit Staff":"Add Staff"}</h2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
              <div style={{gridColumn:"1/-1"}}><label>Full Name *</label><input className="inp" value={staffForm.name||""} onChange={e=>setStaffForm(p=>({...p,name:e.target.value}))} placeholder="Full name"/></div>
              <div style={{gridColumn:"1/-1"}}><label>Email *</label><input className="inp" type="email" value={staffForm.email||""} onChange={e=>setStaffForm(p=>({...p,email:e.target.value}))} placeholder="email@smgroup.my"/></div>
              <div><label>Department</label><select className="inp" value={staffForm.department||"Audit"} onChange={e=>setStaffForm(p=>({...p,department:e.target.value}))}>{[...DEPARTMENTS,"All"].map(d=><option key={d}>{d}</option>)}</select></div>
              <div><label>Branch</label><select className="inp" value={staffForm.branch||"KL"} onChange={e=>setStaffForm(p=>({...p,branch:e.target.value}))}>{BRANCHES.map(b=><option key={b}>{b}</option>)}</select></div>
              <div><label>Role</label><select className="inp" value={staffForm.role||"staff"} onChange={e=>setStaffForm(p=>({...p,role:e.target.value}))}><option value="staff">Staff</option><option value="manager">Manager</option><option value="admin">Admin</option></select></div>
              <div><label>Monthly Salary (RM)</label><input className="inp" type="number" value={staffForm.salary||""} onChange={e=>setStaffForm(p=>({...p,salary:Number(e.target.value)}))} placeholder="e.g. 3000"/></div>
              <div style={{gridColumn:"1/-1"}}><label>Password *</label><input className="inp" type="text" value={staffForm.password||""} onChange={e=>setStaffForm(p=>({...p,password:e.target.value}))}/></div>
              {staffForm.salary>0&&<div style={{gridColumn:"1/-1",background:"#0f0a1f",border:"1px solid #2d1f4e",borderRadius:8,padding:"9px 12px",fontSize:12,color:"#a78bfa"}}>
                Annual KPI Target: <strong>{fmt(kpiTarget(staffForm.salary))}</strong> ({fmt(staffForm.salary)} × 4.3 × 12)
              </div>}
            </div>
            <div style={{display:"flex",gap:9,marginTop:18,justifyContent:"flex-end"}}>
              <button className="btn bg" onClick={()=>setShowStaffModal(false)}>Cancel</button>
              <button className="btn bp" onClick={saveStaff}>{editStaffId?"Save Changes":"Add Staff"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

</script>

</body>
</html>
