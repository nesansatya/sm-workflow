        label{font-size:11px;color:#475569;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;display:block;margin-bottom:5px}
        .btn{border:none;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;transition:all 0.15s;font-size:13px}
        .bp{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:9px 18px}
        .bp:hover{opacity:0.9;transform:translateY(-1px)}
        .bg{background:transparent;color:#64748b;border:1px solid #1e293b;padding:7px 14px}
        .bg:hover{background:#0f172a;color:#e2e8f0;border-color:#334155}
        .bsm{padding:6px 12px;font-size:12px}
        .nav{background:none;border:none;color:#475569;font-size:12px;font-weight:600;padding:6px 11px;border-radius:7px;cursor:pointer;font-family:inherit;transition:all 0.2s}
        .nav.on{background:#0f1e35;color:#e2e8f0}
        .nav:hover{color:#e2e8f0}
        .tab{background:none;border:none;font-family:inherit;font-size:11px;font-weight:600;color:#475569;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all 0.2s}
        .tab.on{background:#0f1e35;color:#e2e8f0}
        .card{background:#0d1117;border:1px solid #1a2235;border-radius:14px}
        .tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.02em}
        .ntrow:hover{background:#0f172a;cursor:pointer}
        .kpi-glow{box-shadow:0 0 30px #7c3aed22}

        /* \u2500\u2500 TOAST CENTERED \u2500\u2500 */
        .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 32px #00000088;white-space:nowrap;}

        /* \u2500\u2500 MOBILE NAV (hidden on desktop) \u2500\u2500 */
        .mob-nav{display:none}

        /* \u2500\u2500 RESPONSIVE TABLET \u2264900px \u2500\u2500 */
        @media(max-width:900px){
          .desk-nav{flex-wrap:wrap}
          .nav{font-size:11px;padding:5px 8px}
        }

        /* \u2500\u2500 RESPONSIVE MOBILE \u2264640px \u2500\u2500 */
        @media(max-width:640px){
          /* page padding accounts for fixed bottom nav */
          .page-pad{padding:12px 12px 76px!important}

          /* header strips down */
          .hdr-logo-sub{display:none}
          .hdr-name{display:none}
          .desk-nav{display:none!important}
          .hdr-newcase{display:none}
          .user-name-txt{display:none}
          .user-role-txt{display:none}

          /* show mobile bottom nav */
          .mob-nav{
            display:flex;
            position:fixed;bottom:0;left:0;right:0;
            background:#0c1020;
            border-top:2px solid #232d42;
            z-index:300;
            overflow-x:auto;
            padding-bottom:env(safe-area-inset-bottom,0px);
          }
          .mob-nav::-webkit-scrollbar{display:none}
          .mnb{
            flex:1;min-width:50px;max-width:72px;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            background:none;border:none;
            padding:8px 2px 6px;
            cursor:pointer;font-family:inherit;
            position:relative;
            -webkit-tap-highlight-color:transparent;
            border-top:2px solid transparent;
            transition:border-color .15s;
          }
          .mnb.active{border-top-color:#6366f1}
          .mnb .mico{font-size:20px;line-height:1;display:block;margin-bottom:3px}
          .mnb .mlbl{font-size:9px;font-weight:700;color:#4b5563;display:block;letter-spacing:.01em}
          .mnb.active .mlbl{color:#818cf8}
          .mnb-plus{flex:0 0 60px}
          .mnb-plus .mico-plus{
            width:36px;height:36px;
            background:linear-gradient(135deg,#6366f1,#8b5cf6);
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:22px;color:white;margin-bottom:2px;
            box-shadow:0 4px 14px #6366f155;
          }

          /* grids collapse */
          .g6-stat{grid-template-columns:repeat(3,1fr)!important;gap:7px!important}
          .g2-dash{grid-template-columns:1fr!important}
          .g2-form{grid-template-columns:1fr!important}
          .g3-kpi{grid-template-columns:1fr 1fr!important}

          /* cases: detail panel full screen */
          .cases-wrap{flex-direction:column!important}
          .case-detail-col{
            position:fixed!important;inset:0!important;top:50px!important;
            width:100%!important;z-index:400!important;
            overflow-y:auto!important;
            background:#060912!important;
          }
          .case-detail-col .card{border-radius:0!important;border-left:none!important;border-right:none!important;min-height:calc(100vh - 50px)!important}

          /* modals slide up from bottom */
          .modal-ov{align-items:flex-end!important;padding:0!important}
          .modal-bx{border-radius:18px 18px 0 0!important;max-width:100%!important;max-height:91vh!important;padding:18px 14px!important}

          /* notif panel full width */
          .notif-panel{position:fixed!important;top:50px!important;left:8px!important;right:8px!important;width:auto!important;border-radius:12px!important;max-height:75vh!important}

          /* pipeline scroll */
          .pipeline-wrap{overflow-x:auto!important}

          /* report/company layout */
          .g4-rep{grid-template-columns:1fr 1fr!important}
          .co-layout{flex-direction:column!important}
          .co-side{width:100%!important;position:static!important}

          h1{font-size:18px!important}
          h2{font-size:16px!important}
        }

        @media(max-width:380px){
          .mnb{min-width:42px}
          .mnb .mico{font-size:18px}
          .mnb .mlbl{font-size:8px}
          .g6-stat{grid-template-columns:1fr 1fr!important}
        }
